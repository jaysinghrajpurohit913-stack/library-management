<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library — Book Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-texture"></div>

  <div class="container">

    <header class="header">
      <div class="header-eyebrow">— Collection Manager —</div>
      <h1 class="header-title">The Library</h1>
      <p class="header-sub">Curate, track, and manage your books with ease.</p>
    </header>

    <section class="card form-card">
      <div class="card-label">Add a New Book</div>

      <div class="form-grid">
        <div class="field">
          <label for="title">Title</label>
          <input id="title" type="text" placeholder="e.g. The Great Gatsby" />
        </div>
        <div class="field">
          <label for="author">Author</label>
          <input id="author" type="text" placeholder="e.g. F. Scott Fitzgerald" />
        </div>
        <div class="field">
          <label for="year">Published Date</label>
          <input id="year" type="date" />
        </div>
        <div class="field">
          <label for="price">Price (₹)</label>
          <input id="price" type="number" placeholder="e.g. 499" />
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" onclick="addBook()">
          <span class="btn-icon">+</span> Add Book
        </button>
        <button class="btn btn-ghost" onclick="fetchBooks()">
          ↻ Refresh List
        </button>
      </div>
    </section>

    <section class="list-section">
      <div class="list-header">
        <h2 class="list-title">Book Collection</h2>
        <span class="book-count" id="bookCount">0 titles</span>
      </div>

      <ul id="bookList" class="book-list">
        <li class="empty-state">
          <span class="empty-icon">📚</span>
          <span>No books yet. Add one above.</span>
        </li>
      </ul>
    </section>

  </div>

  <footer class="footer">
    <span>Library Manager &copy; 2025</span>
  </footer>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
